---
layout: default
---
<div class="page-header">
  <div class="container">
    <div class="post-header">
      <div class="post-header__tags">
        {% for tag in page.tags %}<span class="card__tag">{{ tag }}</span> {% endfor %}
      </div>
      <h1>{{ page.title }}</h1>
      <div class="post-header__meta">
        <span>📅 {{ page.date | date: "%B %d, %Y" }}</span>
        {% if page.read_time %}<span>⏱ {{ page.read_time }} min read</span>{% endif %}
      </div>
    </div>
  </div>
</div>
<section class="section">
  <div class="container">
    {% if page.hero_image %}
      <img src="{{ page.hero_image | relative_url }}" alt="{{ page.title }}" style="width:100%; max-height:420px; object-fit:cover; border-radius:var(--radius); margin-bottom:var(--sp-xl); box-shadow:var(--shadow-lg);">
    {% endif %}
    <div class="post-content">{{ content }}</div>
    <div style="margin-top:var(--sp-2xl); padding-top:var(--sp-lg); border-top:1px solid var(--clr-border); display:flex; justify-content:space-between;">
      <a href="{{ '/case-studies/' | relative_url }}" class="btn btn--outline">← All Case Studies</a>
    </div>
  </div>
</section>
